{{- if not .Values.clusterName }}
{{- fail "clusterName is required: set --set clusterName=<your-cluster>" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter-provider-hetzner
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: karpenter-provider-hetzner
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: karpenter-provider-hetzner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: karpenter-provider-hetzner
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: HCLOUD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretRef.name }}
                  key: {{ .Values.auth.secretRef.key }}
            - name: CLUSTER_NAME
              value: {{ .Values.clusterName | quote }}
            - name: METRICS_PORT
              value: {{ .Values.metrics.port | quote }}
            - name: HEALTH_PROBE_PORT
              value: {{ .Values.healthProbe.port | quote }}
          ports:
            - name: http-metrics
              containerPort: {{ .Values.metrics.port }}
            - name: http-health
              containerPort: {{ .Values.healthProbe.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http-health
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http-health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
