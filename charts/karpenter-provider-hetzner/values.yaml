replicas: 1

image:
  repository: ghcr.io/paperclipinc/karpenter-provider-hetzner
  tag: latest
  pullPolicy: IfNotPresent

auth:
  secretRef:
    name: hcloud-token
    key: token

serviceAccount:
  create: true
  name: karpenter

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
