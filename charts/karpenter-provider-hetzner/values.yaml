replicas: 1

image:
  repository: ghcr.io/paperclipinc/karpenter-provider-hetzner
  tag: latest
  pullPolicy: IfNotPresent

auth:
  secretRef:
    name: hcloud-token
    key: token

serviceAccount:
  create: true
  name: karpenter

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Required: scopes managed servers so multiple clusters can share one Hetzner project.
clusterName: ""

metrics:
  port: 8080
healthProbe:
  port: 8081

# serviceMonitor wires a Prometheus Operator ServiceMonitor to the metrics port.
# Requires the prometheus.io/operator CRD to be installed in the cluster.
serviceMonitor:
  # enabled: set true to deploy the Service + ServiceMonitor resources.
  enabled: false
  # interval: how often Prometheus scrapes the metrics endpoint.
  interval: 30s
  # additionalLabels: extra labels to add to the ServiceMonitor (e.g. for a
  # Prometheus Operator instance selector).
  additionalLabels: {}
